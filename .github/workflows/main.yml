name: BED Pipeline

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env: 
      DB_HOST: ${{ secrets.DB_HOST }}
      DB_NAME: ${{ secrets.DB_NAME }}
      DB_PASS: ${{ secrets.DB_PASS }}
      DB_USER: ${{ secrets.DB_USER }}
      OMP_NUM_THREADS: 1
      OPENBLAS_NUM_THREADS: 1
      MKL_NUM_THREADS: 1
      NUMEXPR_NUM_THREADS: 1

    steps:
      # Setting up
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: System info (limits)
        run: |
          echo "=== CPU ==="
          lscpu

          echo "=== Memory ==="
          free -h

          echo "=== Disk ==="
          df -h

          echo "=== CPU cores ==="
          nproc

      # Installing dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r pipeline/requirements.txt

      - name: Run Pipeline Process (with monitoring)
        run: |
          echo "Starting resource monitor..."

          # Background monitor
          while true; do
            echo "----- $(date) -----"
            echo "Load:"
            uptime

            echo "Memory (MB):"
            free -m

            echo "Top processes:"
            ps -eo pid,ppid,cmd,%mem,%cpu --sort=-%mem | head -10

            sleep 3
          done > resource_log.txt &

          MONITOR_PID=$!

          echo "Running pipeline..."
          /usr/bin/time -v python -m pipeline.main

          echo "Stopping monitor..."
          kill $MONITOR_PID

          echo "=== Last 50 lines of resource log ==="
          tail -50 resource_log.txt

      # 📦 Optional: upload full log for inspection
      - name: Upload resource log
        uses: actions/upload-artifact@v4
        with:
          name: resource-log
          path: resource_log.txt
